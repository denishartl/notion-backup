# ABOUTME: Docker Compose configuration for notion-backup local development.
# ABOUTME: Production deployment lives in the homelab repo with proxy/monitor networks.

services:
  notion-backup:
    build: .
    image: notion-backup:latest
    container_name: notion-backup
    restart: unless-stopped
    environment:
      - NOTION_TOKEN_PERSONAL=${NOTION_TOKEN_PERSONAL}
      - TZ=${TZ:-UTC}
    ports:
      - "9101:9101"
    volumes:
      - ./data/config.yaml:/data/config.yaml
      - notion-backup-data:/data/backups
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    mem_limit: 256m
    memswap_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  notion-backup-data:
